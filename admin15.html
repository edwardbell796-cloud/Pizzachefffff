<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Cheff | Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #ff4d4d; --dark: #1a1a1a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body { display: flex; background: #f4f7f6; min-height: 100vh; overflow-x: hidden; position: relative; }

    /* --- MATCHING FLOATING BACKGROUND --- */
    .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
    .floating-icon { position: absolute; color: var(--primary); opacity: 0.08; font-size: 1.2rem; animation: floatRandom 15s linear infinite; }
    @keyframes floatRandom {
        0% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(100px, 150px) rotate(90deg); }
        50% { transform: translate(200px, 50px) rotate(180deg); }
        75% { transform: translate(50px, 200px) rotate(270deg); }
        100% { transform: translate(0, 0) rotate(360deg); }
    }

    #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; position: fixed; height: 100%; transition: 0.3s ease; z-index: 1000; }
    .sidebar.hidden { transform: translateX(-260px); }
    .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #333; }
    
    .logo-text { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 2.2rem; display: block; }
    .chef-icon { font-size: 2rem; color: white; margin-bottom: 10px; animation: cook 2s infinite ease-in-out; display: inline-block; }
    @keyframes cook { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg) translateY(-5px); } }

    .nav-link { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; color: #bbb; text-decoration: none; }
    .nav-link:hover, .nav-link.active { background: #333; color: var(--primary); border-left: 4px solid var(--primary); }

    .content { margin-left: 260px; padding: 80px 40px 40px 40px; width: 100%; transition: 0.3s ease; }
    .content.full { margin-left: 0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eee; }
    .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
    
    .live-order-card, .complaint-card { border-left: 5px solid #f39c12; padding: 15px; background: #fff; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .status-pending { background: #fff8e6; color: #b08900; }
    .status-processing { background: #e1f5fe; color: #0288d1; }
    
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="bg-canvas" id="bgCanvas"></div>

<div id="loginOverlay">
  <div class="login-card">
    <h2 style="font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #ff4d4d;">Pizza Cheff</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="btn" onclick="checkLogin()">Enter Dashboard</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><span class="logo-text">Pizza Cheff</span></div>
  <div class="nav-link active" onclick="showTab('current-orders')"><i class="fas fa-clock"></i> Active Orders</div>
  <div class="nav-link" onclick="showTab('add-menu')"><i class="fas fa-pizza-slice"></i> Menu Editor</div>
  <div class="nav-link" onclick="showTab('complaints')"><i class="fas fa-exclamation-circle"></i> Complaints</div>
  <div class="nav-link" onclick="showTab('settings')"><i class="fas fa-cog"></i> Settings</div>
</div>

<div class="content" id="mainContent">
  <div id="current-orders" class="tab-content active">
    <div class="card">
      <h2>Live Management 🛵</h2>
      <div id="liveOrdersContainer"></div>
    </div>
  </div>

  <div id="complaints" class="tab-content">
    <div class="card">
      <h2>Customer Feedback 💬</h2>
      <div id="complaintsContainer"></div>
    </div>
  </div>

  <div id="settings" class="tab-content">
    <div class="card">
      <h2>Admin Settings ⚙️</h2>
      <label>WhatsApp Number (e.g. 923000000000)</label>
      <input type="text" id="setWhatsApp">
      <label>Contact Email</label>
      <input type="email" id="setEmail">
      <button class="btn" onclick="saveSettings()">Save Changes</button>
    </div>
  </div>

  <div id="add-menu" class="tab-content">
    <div class="card">
      <h2>Add New Item</h2>
      <input type="text" id="itemName" placeholder="Name">
      <input type="number" id="itemPrice" placeholder="Price">
      <input type="text" id="itemImg" placeholder="Image URL">
      <select id="itemCat">
        <option value="pizza">Pizza</option>
        <option value="burger">Burger</option>
      </select>
      <button class="btn" id="addItemBtn">Add to Menu</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getDatabase, ref, onValue, update, set, push, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBq9W6hW_X5sc66r7kB6p8kMUq-17jgJ50",
    authDomain: "pizza-cheff-92db6.firebaseapp.com",
    projectId: "pizza-cheff-92db6",
    databaseURL: "https://pizza-cheff-92db6-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // --- LOGIN ---
  window.checkLogin = () => {
    if(document.getElementById('loginUser').value === "admin" && document.getElementById('loginPass').value === "Asif123") {
      document.getElementById('loginOverlay').style.display = "none";
    }
  };

  // --- BACKGROUND ICONS ---
  function createFloatingIcons() {
      const canvas = document.getElementById('bgCanvas');
      const icons = ['fa-utensils', 'fa-pizza-slice', 'fa-hamburger'];
      for (let i = 0; i < 15; i++) {
          const el = document.createElement('i');
          el.className = `fas ${icons[Math.floor(Math.random() * icons.length)]} floating-icon`;
          el.style.left = Math.random() * 100 + 'vw';
          el.style.top = Math.random() * 100 + 'vh';
          el.style.animationDuration = (Math.random() * 10 + 10) + 's';
          canvas.appendChild(el);
      }
  }
  createFloatingIcons();

  // --- TABS ---
  window.showTab = (id) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
  };

  // --- SETTINGS SYNC ---
  onValue(ref(database, 'settings/contact'), (snap) => {
    const d = snap.val();
    if(d) {
      document.getElementById('setWhatsApp').value = d.whatsapp || "";
      document.getElementById('setEmail').value = d.email || "";
    }
  });

  window.saveSettings = () => {
    set(ref(database, 'settings/contact'), {
      whatsapp: document.getElementById('setWhatsApp').value,
      email: document.getElementById('setEmail').value
    }).then(() => alert("Settings Updated!"));
  };

  // --- COMPLAINTS VIEW ---
  onValue(ref(database, 'complaints/'), (snap) => {
    const cont = document.getElementById('complaintsContainer');
    const data = snap.val();
    cont.innerHTML = data ? "" : "No complaints yet.";
    if(data) Object.keys(data).reverse().forEach(id => {
      const c = data[id];
      cont.innerHTML += `
        <div class="complaint-card">
          <h4>Order ID: ${c.orderId}</h4>
          <p><b>From:</b> ${c.customerName}</p>
          <p style="background:#f9f9f9; padding:10px; border-radius:5px; margin:5px 0;">${c.message}</p>
          <small>${new Date(c.timestamp).toLocaleString()}</small>
          <button class="btn" style="background:#555; padding:5px; margin-top:10px;" onclick="resolveComp('${id}')">Mark Resolved</button>
        </div>`;
    });
  });

  window.resolveComp = (id) => { if(confirm("Delete this complaint?")) remove(ref(database, 'complaints/' + id)); };

  // --- LIVE ORDERS ---
  onValue(ref(database, 'orders/'), (snap) => {
    const cont = document.getElementById('liveOrdersContainer');
    const data = snap.val();
    cont.innerHTML = data ? "" : "No active orders.";
    if(data) Object.keys(data).reverse().forEach(id => {
      const o = data[id];
      if(o.status === 'pending' || o.status === 'processing') {
        cont.innerHTML += `
          <div class="live-order-card">
            <h4>ID: ${id}</h4>
            <p><b>Customer:</b> ${o.customerName}</p>
            <p><b>Items:</b> ${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</p>
            <p><b>Total:</b> Rs ${o.total}</p>
            <div style="margin-top:10px;">
              <button class="btn" style="width:auto; margin-right:5px;" onclick="updateOrder('${id}', 'processing')">Confirm</button>
              <button class="btn" style="width:auto; background:#27ae60;" onclick="updateOrder('${id}', 'completed')">Complete</button>
            </div>
          </div>`;
      }
    });
  });

  window.updateOrder = (id, s) => update(ref(database, 'orders/' + id), { status: s });
</script>
</body>
</html>
